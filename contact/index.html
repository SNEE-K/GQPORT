    /* ── CONTACT PAGE ── */
    .contact-page {
      min-height: 100svh;
      padding: 140px 40px 80px;
      max-width: 900px;
      margin: 0 auto
    }

    .cp-h1 {
      font-family: var(--disp);
      font-size: clamp(60px, 10vw, 130px);
      letter-spacing: .03em;
      line-height: .86;
      margin-bottom: 16px
    }

    .cp-sub {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: .16em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 64px
    }

    /* ── SOCIALS ── */
    .cp-socials {
      display: flex;
      gap: 28px;
      margin-bottom: 80px
    }

    .cp-social {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 1px solid var(--border);
      border-radius: 50%;
      color: var(--dim);
      transition: color .2s, border-color .2s;
      cursor: none
    }

    .cp-social:hover {
      color: var(--accent);
      border-color: var(--accent)
    }

    .cp-social svg {
      width: 18px;
      height: 18px;
      fill: currentColor
    }

    /* ── INFO ROW ── */
    .cp-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      margin-bottom: 64px;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden
    }

    .cp-info-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 20px 24px;
      background: var(--bg2)
    }

    .cp-info-icon {
      flex-shrink: 0;
      color: var(--accent)
    }

    .cp-info-icon svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .cp-info-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .12em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 4px
    }

    .cp-info-val {
      font-size: 13px;
      color: var(--text)
    }

    /* ── FORM ── */
    .cp-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px
    }

    .cp-form-full {
      grid-column: 1/-1
    }

    .cp-field {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .cp-field label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .14em;
      color: var(--dim);
      text-transform: uppercase
    }

    .cp-field input,
    .cp-field textarea {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 14px 16px;
      color: var(--text);
      font-family: var(--body);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%
    }

    .cp-field input:focus,
    .cp-field textarea:focus {
      border-color: var(--accent)
    }

    .cp-field textarea {
      resize: vertical;
      min-height: 140px
    }

    .cp-submit {
      grid-column: 1/-1;
      margin-top: 8px
    }

    .cp-submit button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: var(--bg);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 15px 36px;
      border-radius: 100px;
      border: none;
      cursor: none;
      transition: background .2s
    }

    .cp-submit button:hover {
      background: var(--text)
    }

    .cp-success {
      display: none;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: .1em;
      color: #4ade80;
      text-transform: uppercase;
      margin-top: 20px;
      grid-column: 1/-1
    }

    @media(max-width:900px) {
      .contact-page {
        padding: 120px 20px 60px
      }

      .cp-info {
        grid-template-columns: 1fr
      }

      .cp-form {
        grid-template-columns: 1fr
      }

      .cp-form-full {
        grid-column: 1
      }

      .cp-submit {
        grid-column: 1
      }

      .cp-success {
        grid-column: 1
      }
    }

  <script>
    (function () {
      'use strict';

      var lerp = function (a, b, t) { return a + (b - a) * t; };

      /* ── CURSOR ── */
      var cur = document.getElementById('cur');
      var ring = document.getElementById('cur-ring');
      var mx = 0, my = 0, rx = 0, ry = 0;

      document.addEventListener('mousemove', function (e) {
        mx = e.clientX; my = e.clientY;
        cur.style.transform = 'translate3d(' + (mx - 4) + 'px,' + (my - 4) + 'px,0)';
      });

      (function ringTick() {
        rx = lerp(rx, mx, 0.18);
        ry = lerp(ry, my, 0.18);
        ring.style.transform = 'translate3d(' + (rx - 20) + 'px,' + (ry - 20) + 'px,0)';
        requestAnimationFrame(ringTick);
      })();

      document.querySelectorAll('a, button').forEach(function (el) {
        el.addEventListener('mouseenter', function () { cur.classList.add('big'); });
        el.addEventListener('mouseleave', function () { cur.classList.remove('big'); });
      });

      /* ── NAV SCROLL BLUR ── */
      var nav = document.querySelector('nav');
      window.addEventListener('scroll', function () {
        nav.classList.toggle('scrolled', window.scrollY > 20);
      }, { passive: true });

      /* ── FORM SUBMISSION ── */
      var form = document.getElementById('contact-form');
      form.addEventListener('submit', function (e) {
        var action = form.getAttribute('action');
        if (action.indexOf('YOUR_FORM_ID') !== -1) {
          e.preventDefault();
          document.getElementById('form-success').style.display = 'block';
          form.reset();
          return;
        }
        e.preventDefault();
        var data = new FormData(form);
        fetch(action, { method: 'POST', body: data, headers: { 'Accept': 'application/json' } })
          .then(function (r) {
            if (r.ok) {
              document.getElementById('form-success').style.display = 'block';
              form.reset();
            }
          });
      });

    })();

    /* ── BINARY ARTIFACTS ── */
    if (window.innerWidth > 900) (function () {
      var canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1';
      document.body.appendChild(canvas);
      var ctx = canvas.getContext('2d');

      var W, H, particles = [];
      var mouse = { x: -999, y: -999 };
      var CHARS = ['0', '1'];
      var COUNT = 80;
      var REPEL_RADIUS = 120;
      var REPEL_FORCE = 3.5;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
        ctx.font = 'bold 13px "DM Mono", monospace';
      }

      function rand(min, max) { return min + Math.random() * (max - min); }

      function Particle() { this.reset(true); }
      Particle.prototype.reset = function (anywhere) {
        this.x = rand(0, W);
        this.y = anywhere ? rand(0, H) : H + 10;
        this.vx = rand(-0.15, 0.15);
        this.vy = rand(-0.4, -0.15);
        this.ox = this.x;
        this.oy = this.y;
        this.char = CHARS[Math.floor(Math.random() * CHARS.length)];
        this.size = rand(10, 15);
        this.alpha = rand(0.04, 0.12);
        this.life = 0;
        this.maxLife = rand(180, 400);
      };

      for (var i = 0; i < COUNT; i++) particles.push(new Particle());

      document.addEventListener('mousemove', function (e) {
        mouse.x = e.clientX; mouse.y = e.clientY;
      });

      function tick() {
        ctx.clearRect(0, 0, W, H);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.life++;
          var dx = p.x - mouse.x, dy = p.y - mouse.y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < REPEL_RADIUS && dist > 0) {
            var force = (REPEL_RADIUS - dist) / REPEL_RADIUS * REPEL_FORCE;
            p.x += (dx / dist) * force;
            p.y += (dy / dist) * force;
          } else {
            p.x += (p.ox - p.x) * 0.02 + p.vx;
            p.y += (p.oy - p.y) * 0.02 + p.vy;
            p.oy += p.vy;
          }
          var progress = p.life / p.maxLife;
          var fade = progress < 0.1 ? progress / 0.1 : progress > 0.8 ? (1 - progress) / 0.2 : 1;
          ctx.globalAlpha = p.alpha * fade;
          ctx.fillStyle = '#ffffff';
          ctx.fillText(p.char, p.x, p.y);
          if (p.life >= p.maxLife || p.y < -20) p.reset(false);
        }
        requestAnimationFrame(tick);
      }

      window.addEventListener('resize', resize);
      resize();
      tick();
    })();
    // end desktop-only binary artifacts
  </script>
